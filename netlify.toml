[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  # These are public client-side values (VITE_ prefix), not secrets
  # They're intentionally bundled into the client code
  # Include both VITE_ and non-VITE_ versions since Netlify detects the values
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,SUPABASE_URL,VITE_GOOGLE_CLIENT_ID,GOOGLE_CLIENT_ID,VITE_GOOGLE_REDIRECT_URI,GOOGLE_REDIRECT_URI"

[dev]
  targetPort = 8080

[dev]
  targetPort = 8080

# Handle client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache index.html for a shorter time
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate" 